{% extends "layout.html" %}
{% load crispy_forms_tags %}

{% block body %}
    <h2 class="header-text-user">Giriş Yap</h2>
    <div class="login-form-container">
        <form method="post">
            {% csrf_token %}
            <div class="login-form">
                {{ form|crispy }}
            </div>
            <div class="button-container">
                <button type="submit" class="login-button">Giriş Yap</button>
            </div>
        </form>
    </div>
{% endblock body %}
